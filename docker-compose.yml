# ==========================================================
# docker-compose.yml — Golf Huub (Environnement Complet)
# Orchestre : MySQL + Redis + Backend Node.js + Frontend React/Nginx
#
# Usage :
#   Développement : docker compose up
#   Production    : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==========================================================

version: '3.9'

services:

  # ── Base de données MySQL ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: golf_huub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword_dev}
      MYSQL_DATABASE: ${DB_NAME:-golf_marketing}
      MYSQL_USER: ${DB_USER:-golf_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-golf_dev_pass}
      # Forcer l'encodage UTF-8 pour les caractères spéciaux (prénoms, villes)
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      # Persistance des données entre les redémarrages
      - mysql_data:/var/lib/mysql
      # Initialisation automatique du schéma au premier démarrage
      - ./sql/golf_marketing_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # Expose MySQL sur localhost pour phpMyAdmin ou Workbench (optionnel en prod)
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - golf_network

  # ── Redis (queue campaigns, mfaStore, rate limiting) ──────
  redis:
    image: redis:7-alpine
    container_name: golf_huub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - golf_network

  # ── Backend Node.js / Express ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: golf_huub_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      # Base de données — utilise le nom du service "db" (pas localhost !)
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-golf_marketing}
      DB_USER: ${DB_USER:-golf_user}
      DB_PASSWORD: ${DB_PASSWORD:-golf_dev_pass}
      DB_DIALECT: mysql
      # Sécurité
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      # Frontend origin pour CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5000}
      # Upload
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      # Email (optionnel en dev)
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      GRAPH_SENDER_EMAIL: ${GRAPH_SENDER_EMAIL:-}
      # Redis — queue et session store (optionnel, active BullMQ si configuré)
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      # Partage du dossier uploads (fichiers persistants entre redémarrages)
      - uploads_data:/app/uploads
      # En développement : montage du code source pour hot-reload
      # (commenter en production pour utiliser uniquement l'image buildée)
      - ./backend:/app
      - /app/node_modules   # Exclure node_modules du montage host
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/csrf-token', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - golf_network

  # ── Frontend React (servi par Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # L'API est accessible sur le backend (via le réseau interne Docker ou Nginx proxy)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: golf_huub_frontend
    restart: unless-stopped
    ports:
      - "3000:80"   # Port Nginx interne 80 → Port host 3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - golf_network

# ── Volumes persistants ────────────────────────────────────
volumes:
  mysql_data:
    name: golf_huub_mysql_data
  uploads_data:
    name: golf_huub_uploads
  redis_data:
    name: golf_huub_redis

# ── Réseau interne isolé ──────────────────────────────────
networks:
  golf_network:
    name: golf_huub_network
    driver: bridge
