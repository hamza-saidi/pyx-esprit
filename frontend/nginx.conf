server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Masquer la version Nginx dans les headers d'erreur
    server_tokens off;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/ttf image/svg+xml;

    # ── Headers de sécurité ───────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # Décommenter si HTTPS est terminé ici (pas derrière un reverse proxy) :
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy API backend ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
        client_max_body_size 50m;
    }

    # ── Assets statiques Vite (hachés) ────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|webp|avif|png|jpg|jpeg|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media uploads (images des emails) ────────────────────
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── React Router SPA fallback ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
