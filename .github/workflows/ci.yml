# ==========================================================
# .github/workflows/ci.yml — Golf Huub Backend CI Pipeline
# 
# Déclenché sur : push sur main/develop, et toute Pull Request
# Ce pipeline garantit que :
#   1. Le code respecte les règles ESLint
#   2. Tous les tests Jest passent
#   3. Le rapport de couverture est généré
# ==========================================================

name: 🧪 Backend CI — Lint & Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  # ── Job 1 : Lint ───────────────────────────────────────────
  lint:
    name: 📋 ESLint Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: cd backend && npm ci

      - name: 🔍 Run ESLint
        run: cd backend && npx eslint . --ext .js --max-warnings 0

  # ── Job 2 : Tests Unitaires & Intégration ─────────────────
  test:
    name: 🧪 Jest Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint   # Les tests ne tournent que si le lint passe

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: golf_marketing_test
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: cd backend && npm ci

      - name: ⏳ Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u ci_user -pci_password --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: 🗄️ Initialize test database schema
        run: |
          mysql -h 127.0.0.1 -u ci_user -pci_password golf_marketing_test < sql/golf_marketing_schema.sql || true
        # "|| true" : ne pas échouer si le fichier SQL a déjà été importé

      - name: 🧪 Run Jest tests with coverage
        env:
          NODE_ENV: test
          PORT: 5001
          # JWT
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32
          # Base de données de test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: golf_marketing_test
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_DIALECT: mysql
          # Redis (BullMQ queue service + auth session)
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          # Désactiver les emails pendant les tests
          MAIL_PROVIDER: mock
          FRONTEND_URL: http://localhost:3000
          PUBLIC_BASE_URL: http://localhost:5001
        run: cd backend && npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()   # Même si les tests échouent, on veut voir le rapport
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ── Job 3 : Build Docker (validation que le Dockerfile est valide) ──
  docker-build:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Backend Docker image (validation uniquement)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false   # Ne pas push sur Docker Hub, juste valider la compilation
          tags: golf-huub-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
