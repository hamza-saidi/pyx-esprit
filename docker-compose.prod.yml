# ==========================================================
# docker-compose.prod.yml — Pylon Pyx (Production)
#
# Fichier standalone, N'utiliser PAS comme overlay :
#   docker compose -f docker-compose.prod.yml up -d
#
# Prérequis :
#   - Images buildées et pushées sur GHCR (via CI/CD)
#   - Fichier .env à la racine du projet (voir backend/.env.example)
# ==========================================================

version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: pylon_pyx_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?}
      MYSQL_DATABASE:      ${DB_NAME:?}
      MYSQL_USER:          ${DB_USER:?}
      MYSQL_PASSWORD:      ${DB_PASSWORD:?}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - pylon_network
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: pylon_pyx_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - pylon_network
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-pylon-pyx/pylon-pyx}-backend:${IMAGE_TAG:-latest}
    container_name: pylon_pyx_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME:     ${DB_NAME:?}
      DB_USER:     ${DB_USER:?}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_DIALECT:  mysql
      JWT_SECRET:          ${JWT_SECRET:?}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:?}
      FRONTEND_URL:   ${FRONTEND_URL:?}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      MAIL_PROVIDER:      ${MAIL_PROVIDER:-smtp}
      GRAPH_TENANT_ID:    ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID:    ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      GRAPH_SENDER_EMAIL: ${GRAPH_SENDER_EMAIL:-}
      GROQ_API_KEY:       ${GROQ_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/csrf-token', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - pylon_network
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-pylon-pyx/pylon-pyx}-frontend:${IMAGE_TAG:-latest}
    container_name: pylon_pyx_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - pylon_network
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

volumes:
  mysql_data:  { name: pylon_pyx_mysql }
  uploads_data: { name: pylon_pyx_uploads }
  redis_data:  { name: pylon_pyx_redis }

networks:
  pylon_network:
    name: pylon_pyx_network
    driver: bridge
